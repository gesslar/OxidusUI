name: Release

on:
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  release:
    if: github.event.pull_request.merged == true
    uses: gesslar/Maint/.github/workflows/ReleaseMudlet.yaml@main
    with:
      quality_check: ""
      inject_mupdate: false
    secrets: inherit
    permissions:
      contents: write
